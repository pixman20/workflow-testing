name: Publish Npm Package
run-name: ${{ inputs.stage_only && 'Stage publish' || 'Publish' }}

on:
  workflow_dispatch:
    inputs:
      stage_only:
        description: "Stage only (run 'npm stage publish' instead of 'npm publish')"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  Publish:
    name: Publish
    environment: NPM
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Node version
        id: retrieve-node-version
        run: |
          NODE_NVMRC=$(cat .nvmrc)
          NODE_VERSION=${NODE_NVMRC/v/''}
          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.retrieve-node-version.outputs.node_version }}
          registry-url: "https://registry.npmjs.org/"

      - name: Install Husky
        run: npm install -g husky

      - name: Install NPM
        run: |
          npm install -g npm@latest # npm 11.5.1 or later is required to publish w/ OIDC
          npm --version

      - name: Publish to NPM
        if: ${{ !inputs.stage_only }}
        run: npm publish --access public

      - name: Stage publish to NPM
        if: ${{ inputs.stage_only }}
        run: npm stage publish
