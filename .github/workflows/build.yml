name: Build Npm Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Sigstore signing of the provenance statement

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Node version
        id: retrieve-node-version
        run: |
          NODE_NVMRC=$(cat .nvmrc)
          NODE_VERSION=${NODE_NVMRC/v/''}
          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.retrieve-node-version.outputs.node_version }}

      - name: Build package
        run: |
          mkdir -p build
          echo "console.log('built artifact from ${GITHUB_SHA}');" > build/index.js

      # Pack the FINAL npm tarball here in the build repo (README.md + package.json
      # present, so contents are correct). It will be published verbatim from the
      # deploy repo — the provenance subject is this tarball's sha-512, so it must
      # NOT be repacked downstream.
      - name: Pack npm tarball
        id: pack
        run: |
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "Packed: $TARBALL"

      # Generate a SLSA provenance statement bound to the tarball, then
      # Sigstore-sign it under THIS repo's OIDC identity (the build/source repo).
      - name: Generate provenance statement
        run: npx --yes @npmcli/provenance-cli generate "${{ steps.pack.outputs.tarball }}" -o provenance-statement.json

      - name: Sign provenance statement
        run: npx --yes @sigstore/cli attest ./provenance-statement.json -o provenance.sigstore.json

      - name: Upload publish bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-publish-bundle
          path: |
            ${{ steps.pack.outputs.tarball }}
            provenance.sigstore.json
